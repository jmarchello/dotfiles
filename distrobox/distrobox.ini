[dev]
additional_packages="git wireguard-tools tmux neovim base-devel openssl"
image=archlinux:latest
volume="/etc/wireguard/:/etc/wireguard/"
start_now=true

[ruby-install]
clone=dev
init_hooks="wget https://github.com/postmodern/ruby-install/releases/download/v0.10.1/ruby-install-0.10.1.tar.gz & tar -xzvf ruby-install-0.10.1.tar.gz & cd ruby-install-0.10.1/ & sudo make install"
start_now=true

[ruby3.4.1]
clone=ruby-install
# init_hooks="ruby-install --system ruby 3.4.1"
start_now=true
